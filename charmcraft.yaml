# This file configures Charmcraft.
# See https://documentation.ubuntu.com/charmcraft/stable/reference/files/charmcraft-yaml-file/
type: charm
name: otelcol-integrator-operator
title: OpenTelemetry Collector Integrator
summary: Enables OpenTelemetry Collector to send telemetry to external backends.
description: |
  The OpenTelemetry Collector Integrator acts as a configuration bridge for the OpenTelemetry Collector.

  It allows injection of arbitrary exporter configurations into OpenTelemetry Collector instances,
  enabling telemetry export to external non-charmed backends like Datadog, New Relic, Splunk, etc

  The charm securely manages credentials and API keys through Juju secrets, automatically granting
  access to related OpenTelemetry Collector instances.

  Useful for operators needing to send metrics, logs, or traces to SaaS observability platforms.

  This charm is workloadless, which means it can be deployed in either Virtual Machines or Kubernetes.

# Documentation:
# https://documentation.ubuntu.com/charmcraft/stable/howto/build-guides/select-platforms/

assumes:
  - juju >= 3.6

platforms:
  ubuntu@22.04:amd64:
  ubuntu@22.04:arm64:
  ubuntu@24.04:amd64:
  ubuntu@24.04:arm64:

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv

config:
  options:
    config_yaml:
      description: |
        YAML configuration text that will be shared with related applications
        via the external-config relation.
      default: ""
      type: string
    metrics_pipeline:
      description: |
        Enable routing of exporters to the Metrics pipeline.
      default: false
      type: boolean
    logs_pipeline:
      description: |
        Enable routing of exporters to the Logs pipeline.
      default: false
      type: boolean
    traces_pipeline:
      description: |
        Enable routing of exporters to the Traces pipeline.
      default: false
      type: boolean

# Provides external-config relation to share configuration and secrets
provides:
  external-config:
    interface: external-config

# Actions
actions:
  create-secret:
    description: |
      Create a Juju secret with arbitrary key-value pairs.
      You pass 'name' for the secret label, and any additional
      parameters will be stored as key-value pairs in the secret.

      Secrets can be created by both users and applications.
      In the case of secrets created by users, they can grant read
      permissions to other applications within the same Juju model.

      On the other hand, when secrets are created by applications,
      they can grant read permissions to other applications through
      the relation established between them.

      As otelcol-integrator supports CMR, the only way to grant read
      permissions on secrets to applications that are in another Juju model
      is for the application itself to create the secrets.
      That is why this action exists.

    params:
      name:
        type: string
        description: A label/name for the secret.
    required: [name]
    additionalProperties: true
