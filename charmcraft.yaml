# This file configures Charmcraft.
# See https://documentation.ubuntu.com/charmcraft/stable/reference/files/charmcraft-yaml-file/
type: charm
name: otelcol-integrator-operator
title: Charm Template
summary: A very short one-line summary of the charm.
description: |
  A single sentence that says what the charm is, concisely and memorably.

  A paragraph of one to three short sentences, that describe what the charm does.

  A third paragraph that explains what need the charm meets.

  Finally, a paragraph that describes whom the charm is useful for.

# Documentation:
# https://documentation.ubuntu.com/charmcraft/stable/howto/build-guides/select-platforms/
base: ubuntu@22.04
platforms:
  amd64:
  arm64:

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv

config:
  options:
    config_yaml:
      description: |
        YAML configuration text that will be shared with related applications
        via the external-config relation.
      default: ""
      type: string
    metrics_pipeline:
      description: |
        Enable routing of exporters/receivers/processors to the Metrics pipeline.
      default: false
      type: boolean
    logs_pipeline:
      description: |
        Enable routing of exporters/receivers/processors to the Logs pipeline.
      default: false
      type: boolean
    traces_pipeline:
      description: |
        Enable routing of exporters/receivers/processors to the Traces pipeline.
      default: false
      type: boolean

# Provides external-config relation to share configuration and secrets
provides:
  external-config:
    interface: external-config

# Actions
actions:
  create-secret:
    description: |
      Create a Juju secret with arbitrary key-value pairs.
      You can pass 'name' for the secret label, and any additional
      parameters will be stored as key-value pairs in the secret.
    params:
      name:
        type: string
        description: A label/name for the secret.
    required: [name]
    additionalProperties: true
